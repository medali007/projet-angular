<div *ngIf="suggestion" class="suggestion-details">
  <h2>{{ suggestion.title }}</h2>
  
  <div class="details-content">
    <p><strong>Description:</strong> {{ suggestion.description }}</p>
    <p><strong>Catégorie:</strong> {{ suggestion.category }}</p>
    <p><strong>Date:</strong> {{ suggestion.date | date:'dd/MM/yyyy' }}</p>
    <p><strong>Statut:</strong> {{ suggestion.status }}</p>
    <p><strong>Likes:</strong> {{ suggestion.nbLikes }}</p>
  </div>

  <button (click)="backToList()" class="btn-back">
    ← Back to List
  </button>
</div>

<div *ngIf="!suggestion" class="no-suggestion">
  <p>Suggestion not found</p>
  <button (click)="backToList()" class="btn-back">
    ← Back to List
  </button>
</div>
